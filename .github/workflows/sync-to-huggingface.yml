# Hugging Face Spaces와 GitHub 저장소 동기화
# https://huggingface.co/docs/hub/spaces-github-actions
#
# 사용 전: GitHub 저장소 Settings → Secrets and variables → Actions
# 에서 Repository secret 이름 HF_TOKEN 값으로 Hugging Face API 토큰(쓰기 권한)을 등록하세요.

name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://chanyoung12:${HF_TOKEN}@huggingface.co/spaces/chanyoung12/scy_ReadPortfolio_agent main
