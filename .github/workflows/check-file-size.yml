# Spaces는 10MB 초과 파일에 Git LFS 권장. PR에서 대용량 파일 경고
# https://huggingface.co/docs/hub/spaces-github-actions

name: Check file size (HF Spaces limit)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-large-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check large files (>10MB)
        uses: ActionsDesk/lfs-warning@v2.0
        with:
          filesizelimit: 10485760
